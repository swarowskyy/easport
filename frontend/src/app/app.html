<div class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-purple-950 to-black text-white p-4 md:p-8 font-sans">
  
  <header class="text-center mb-12 relative">
    <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-64 h-64 bg-cyan-500/20 blur-[100px] rounded-full"></div>
    <h1 class="text-5xl md:text-7xl font-black tracking-tighter italic uppercase italic">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500">Arena</span> 
      <span class="text-white"> Pro-Player</span>
    </h1>
    <p class="text-slate-400 font-mono tracking-widest mt-2">LIGA BRASILEIRA DE TALENTOS // 2026</p>
  </header>

  <div class="max-w-4xl mx-auto backdrop-blur-md bg-white/5 p-1 rounded-2xl border border-white/10 shadow-2xl mb-16">
    <div class="bg-slate-900/80 p-6 rounded-xl flex flex-col md:flex-row gap-4 items-center">
      <div class="w-full">
        <label class="text-[10px] uppercase font-bold text-cyan-500 ml-1">Nome da Equipe</label>
        <input [(ngModel)]="novoTime.nome" placeholder="Ex: LOUD, Fluxo..."
          class="w-full bg-slate-800/50 p-4 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 transition-all text-lg">
      </div>

      <div class="w-full md:w-80">
        <label class="text-[10px] uppercase font-bold text-cyan-500 ml-1">Selecione a Modalidade</label>
        <select [(ngModel)]="novoTime.jogo"
          class="w-full bg-slate-800/50 p-4 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 text-white appearance-none cursor-pointer">
          <option value="">Selecione o Jogo</option>
          <option value="Free Fire">Free Fire</option>
          <option value="Valorant">Valorant</option>
          <option value="Honor of Kings">Honor of Kings</option>
          <option value="League of Legends">League of Legends</option>
          <option value="Counter-Strike 2">Counter-Strike 2</option>
          <option value="EA FC 26">EA FC 26</option>
          <option value="Roblox">Roblox (E-sports)</option>
          <option value="Mobile Legends">Mobile Legends</option>
          <option value="Wild Rift">LoL: Wild Rift</option>
          <option value="Rocket League">Rocket League</option>
        </select>
      </div>

      <button (click)="adicionar()"
        class="w-full md:w-auto mt-4 md:mt-4 bg-gradient-to-br from-cyan-500 to-blue-600 hover:from-fuchsia-500 hover:to-purple-600 px-10 py-4 rounded-lg font-black transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.4)]">
        RECRUTAR
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
    <div *ngFor="let t of times" 
      class="group relative bg-slate-900 border border-white/10 p-6 rounded-3xl overflow-hidden transition-all duration-500 hover:-translate-y-2">
      
      <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500 to-fuchsia-500 opacity-0 group-hover:opacity-100 transition duration-500 blur"></div>
      
      <div class="relative bg-slate-900 rounded-[22px] p-6 h-full flex flex-col justify-between">
        
        <div class="flex justify-between items-start">
          <span class="text-[10px] font-black px-3 py-1 bg-white/10 rounded-full border border-white/20 tracking-tighter">
            {{ t.jogo }}
          </span>
          <button (click)="remover(t.id)" class="text-slate-600 hover:text-red-500 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>

        <h2 class="text-3xl font-black mt-4 truncate tracking-tight">{{ t.nome }}</h2>

        <div class="mt-8 flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
          <div>
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Patente Atual</p>
            <p class="text-xl font-black italic"
              [ngClass]="{
                'text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.5)]': t.rank === 'Ouro',
                'text-slate-300': t.rank === 'Prata',
                'text-orange-700': t.rank === 'Bronze'
              }">
              {{ t.rank }}
            </p>
          </div>
          
          <div class="text-center">
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Vitórias</p>
            <p class="text-2xl font-mono font-bold">{{ t.vitorias }}</p>
          </div>
        </div>

        <button (click)="vitoria(t.id)"
          class="mt-6 w-full py-3 rounded-xl font-black uppercase text-sm tracking-widest transition-all bg-white/5 hover:bg-white hover:text-black border border-white/10">
          Registrar Vitória
        </button>
      </div>
    </div>
  </div>
</div>
