<div class="min-h-screen .bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-emerald-950 via-slate-950 to-black text-white p-6 md:p-12 font-sans selection:bg-emerald-500 selection:text-black">

  <header class="text-center mb-16 relative">
    <div class="absolute -top-20 left-1/2 -translate-x-1/2 w-96 h-96 bg-emerald-500/10 blur-[120px] rounded-full animate-pulse"></div>
    
    <h1 class="text-6xl md:text-8xl font-black tracking-tighter italic uppercase relative">
      <span class="bg-clip-text text-transparent .bg-gradient-to-b from-emerald-300 via-emerald-500 to-teal-600 drop-shadow-sm">
        Torneio
      </span>
      <br class="md:hidden">
      <span class="text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">e-games</span>
    </h1>
    
    <div class="flex items-center justify-center gap-4 mt-4">
      <div class=".h-\[/1px\] w-12 .bg-gradient-to-r from-transparent to-emerald-500"></div>
      <p class="text-emerald-400/80 font-mono tracking-[0.3em] text-xs uppercase">Liga Brasileira de Jogos Digitais</p>
      <div class=".h-\[/1px\] w-12 .bg-gradient-to-l from-transparent to-emerald-500"></div>
    </div>
  </header>

  <div class="max-w-5xl mx-auto mb-20 group">
    <div class="relative overflow-hidden backdrop-blur-xl bg-white/5 p-\[/1px\] rounded-2xl border border-emerald-500/20 shadow-[0_0_50px_-12px_rgba(16,185,129,0.2)]">
      <div class="bg-slate-950/90 p-8 rounded-2xl grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
        
        <div class="space-y-2">
          <label class="text-[10px] uppercase font-black text-emerald-500 tracking-tighter">Equipe</label>
          <input [(ngModel)]="novoTime.nome" placeholder="Ex: LOUD"
            class="w-full bg-emerald-950/20 p-4 rounded-xl border border-emerald-500/10 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 transition-all outline-none placeholder:text-slate-600">
        </div>

        <div class="space-y-2">
          <label class="text-[10px] uppercase font-black text-emerald-500 tracking-tighter">Treinador</label>
          <input [(ngModel)]="novoTime.treinador" placeholder="Coach Name"
            class="w-full bg-emerald-950/20 p-4 rounded-xl border border-emerald-500/10 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 transition-all outline-none placeholder:text-slate-600">
        </div>

        <div class="space-y-2">
          <label class="text-[10px] uppercase font-black text-emerald-500 tracking-tighter">Modalidade</label>
          <div class="relative">
            <select [(ngModel)]="novoTime.jogo"
              class="w-full bg-emerald-950/20 p-4 rounded-xl border border-emerald-500/10 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 appearance-none cursor-pointer outline-none">
              <option value="" class="bg-slate-900">Selecione o Jogo</option>
              <option value="Valorant" class="bg-slate-900">Valorant</option>
              <option value="League of Legends" class="bg-slate-900">League of Legends</option>
              <option value="Counter-Strike 2" class="bg-slate-900">Counter-Strike 2</option>
              <option value="Minecraft" class="bg-slate-900">Minecraft</option>
            </select>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80a8,8,0,0,1,11.32-11.32L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"></path></svg>
            </div>
          </div>
        </div>

        <button (click)="adicionar()"
          class="relative group/btn overflow-hidden w-full bg-emerald-500 p-4 rounded-xl font-black text-black transition-all duration-300 hover:shadow-[0_0_30px_rgba(16,185,129,0.6)] active:scale-95">
          <span class="relative z-10">RECRUTAR</span>
          <div class="absolute inset-0 .bg-gradient-to-r from-lime-400 to-emerald-400 opacity-0 group-hover/btn:opacity-100 transition-opacity"></div>
        </button>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
    <div *ngFor="let t of times"
      class="group relative transition-all duration-500 hover:-translate-y-3">
      
      <div class="absolute -inset-1 .bg-gradient-to-r from-emerald-600 to-lime-600 rounded-[30px] blur opacity-20 group-hover:opacity-60 transition duration-500"></div>

      <div class="relative bg-slate-950 border border-white/5 rounded-[28px] p-8 h-full flex flex-col shadow-2xl">
        
        <div class="flex justify-between items-start mb-6">
          <span class="text-[9px] font-black px-4 py-1.5 bg-emerald-500/10 rounded-full border border-emerald-500/20 text-emerald-400 tracking-widest uppercase">
            {{ t.jogo }}
          </span>
          <button (click)="remover(t.id)" class="p-2 text-slate-700 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <h2 class="text-4xl font-black truncate text-white group-hover:text-emerald-400 transition-colors duration-300">
          {{ t.nome }}
        </h2>
        
        <div class="flex items-center gap-2 mt-1">
          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{{ t.treinador }}</span>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-px bg-emerald-500/10 rounded-2xl border border-emerald-500/20 overflow-hidden">
          <div class="bg-black/40 p-4 flex flex-col items-center">
            <p class="text-[9px] text-emerald-500/60 uppercase font-black">Patente</p>
            <p class="text-lg font-black tracking-tighter" [ngClass]="{
                'text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.4)]': t.rank === 'Ouro',
                'text-slate-300':rank === 'Prata',
                'text-orange-700':rank === 'Bronze'
              }">{{rank }}</p>
          </div>
          <div class="bg-black/40 p-4 flex flex-col items-center border-l border-emerald-500/10">
            <p class="text-[9px] text-emerald-500/60 uppercase font-black">Vitórias</p>
            <p class="text-2xl font-mono font-bold text-white">{{vitorias}}</p>
          </div>
        </div>

        <button (click)="vitoria(id)" 
          class="mt-8 w-full py-4 rounded-2xl font-black uppercase text-xs tracking-[0.2em] transition-all bg-emerald-500/5 border border-emerald-500/20 text-emerald-400 hover:bg-emerald-500 hover:text-black hover:shadow-lg hover:shadow-emerald-500/20 active:scale-95">
          🏆 Registrar Vitória
        </button>
      </div>
    </div>
  </div>
</div>
