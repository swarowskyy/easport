<div
  class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-emerald-950 via-slate-950 to-black text-white p-4 md:p-8 font-sans">

  <header class="text-center mb-12 relative">
    <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-64 h-64 bg-emerald-500/20 blur-[100px] rounded-full"></div>
    <h1 class="text-5xl md:text-7xl font-black tracking-tighter italic uppercase">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-lime-500">Torneio</span>
      <span class="text-white">e-games</span>
    </h1>
    <p class="text-emerald-500/60 font-mono tracking-widest mt-2">LIGA BRASILEIRA DE JOGOS DIGITAIS</p>
  </header>

  <div class="max-w-4xl mx-auto backdrop-blur-md bg-emerald-900/5 p-1 rounded-2xl border border-emerald-500/20 shadow-2xl mb-16">
    <div class="bg-slate-900/90 p-6 rounded-xl flex flex-col md:flex-row gap-4 items-center">
      <div class="w-full">
        <label class="text-[10px] uppercase font-bold text-emerald-400 ml-1">Nome da Equipe</label>
        <input [(ngModel)]="novoTime.nome" placeholder="Ex: LOUD, Fluxo..."
          class="w-full bg-slate-800/50 p-4 rounded-lg border border-emerald-900/50 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-lg">
      </div>

      <div class="w-full md:w-80">
        <label class="text-[10px] uppercase font-bold text-emerald-400 ml-1">Selecione a Modalidade</label>
        <select [(ngModel)]="novoTime.jogo"
          class="w-full bg-slate-800/50 p-4 rounded-lg border border-emerald-900/50 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-white appearance-none cursor-pointer">
          <option value="">Selecione o Jogo</option>
          <option value="Free Fire">Free Fire</option>
          <option value="Valorant">Valorant</option>
          <option value="Honor of Kings">Honor of Kings</option>
          <option value="League of Legends">League of Legends</option>
          <option value="Counter-Strike 2">Counter-Strike 2</option>
          <option value="EA FC 26">EA FC 26</option>
          <option value="Roblox">Roblox (E-sports)</option>
          <option value="Mobile Legends">Mobile Legends</option>
          <option value="Wild Rift">LoL: Wild Rift</option>
          <option value="Rocket League">Rocket League</option>
          <option value="Minecraft">Minecraft (Build Battle)</option>
        </select>
      </div>

      <button (click)="adicionar()"
        class="w-full md:w-auto mt-4 md:mt-4 bg-gradient-to-br from-emerald-500 to-teal-700 hover:from-lime-500 hover:to-emerald-600 px-10 py-4 rounded-lg font-black transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(16,185,129,0.4)] text-black">
        RECRUTAR
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
    <div *ngFor="let t of times"
      class="group relative bg-slate-950 border border-emerald-500/10 p-6 rounded-3xl overflow-hidden transition-all duration-500 hover:-translate-y-2">
      
      <div
        class="absolute -inset-0.5 bg-gradient-to-r from-emerald-500 to-lime-500 opacity-0 group-hover:opacity-100 transition duration-500 blur">
      </div>

      <div class="relative bg-slate-950 rounded-[22px] p-6 h-full flex flex-col justify-between">

        <div class="flex justify-between items-start">
          <span
            class="text-[10px] font-black px-3 py-1 bg-emerald-500/10 rounded-full border border-emerald-500/20 tracking-tighter text-emerald-400">
            {{ t.jogo }}
          </span>
          <button (click)="remover(t.id)" class="text-slate-600 hover:text-red-500 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd" />
            </svg>
          </button>
        </div>

        <h2 class="text-3xl font-black mt-4 truncate tracking-tight text-white group-hover:text-emerald-400 transition-colors">{{ t.nome }}</h2>

        <div class="mt-8 flex justify-between items-center bg-black/60 p-4 rounded-2xl border border-emerald-500/10">
          <div>
            <p class="text-[9px] text-emerald-700 uppercase font-bold tracking-widest">Patente Atual</p>
            <p class="text-xl font-black italic" [ngClass]="{
                'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]': t.rank === 'Ouro',
                'text-slate-400': t.rank === 'Prata',
                'text-amber-800': t.rank === 'Bronze'
              }">
              {{ t.rank }}
            </p>
          </div>

          <div class="text-center">
            <p class="text-[9px] text-emerald-700 uppercase font-bold tracking-widest">Vitórias</p>
            <p class="text-2xl font-mono font-bold text-emerald-400">{{ t.vitorias }}</p>
          </div>
        </div>

        <button (click)="vitoria(t.id)" class="mt-6 w-full py-4 rounded-xl font-black uppercase text-sm tracking-widest transition-all 
           bg-slate-900 
           hover:bg-emerald-500 hover:text-black hover:scale-105 active:scale-95
           border border-emerald-500/20 shadow-[0_0_15px_rgba(0,0,0,0.5)] 
           hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] text-emerald-400 group">
          <span class="group-hover:animate-pulse">🏆 Registrar Vitória</span>
        </button>
        <div class="w-full">
  <label class="text-[10px] uppercase font-bold text-emerald-400 ml-1">Treinador</label>
  <input [(ngModel)]="novoTime.treinador" placeholder="Ex: Zews, Gaules..."
    class="w-full bg-slate-800/50 p-4 rounded-lg border border-emerald-900/50 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-lg">
</div>
      </div>
    </div>
  </div>
</div>
